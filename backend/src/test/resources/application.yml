spring:
  datasource:
    url: ${TEST_DB_URL:jdbc:mysql://localhost:3306/ecocampus_test?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${TEST_DB_USERNAME:ecocampus_local}
    password: ${TEST_DB_PASSWORD:ecocampus_local_password}
  sql:
    init:
      mode: never
  flyway:
    enabled: true
    clean-disabled: false
    locations:
      - classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        jdbc:
          time_zone: Asia/Shanghai

ecocampus:
  file-storage:
    local-dir: ./target/test-uploads
    public-url-prefix: /uploads
