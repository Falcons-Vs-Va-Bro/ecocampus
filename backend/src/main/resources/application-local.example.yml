spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:ecocampus}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:ecocampus_local}
    password: ${DB_PASSWORD:ecocampus_local_password}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:12}
      minimum-idle: ${DB_POOL_MIN_IDLE:3}
      connection-timeout: ${DB_POOL_CONNECTION_TIMEOUT_MS:10000}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
  jpa:
    hibernate:
      ddl-auto: validate

ecocampus:
  file-storage:
    type: ${FILE_STORAGE_TYPE:local}
    local-dir: ${FILE_STORAGE_LOCAL_DIR:./storage/uploads}
    public-url-prefix: ${FILE_STORAGE_PUBLIC_URL_PREFIX:/uploads}

server:
  tomcat:
    threads:
      max: ${SERVER_THREADS_MAX:100}
      min-spare: ${SERVER_THREADS_MIN_SPARE:8}
    max-connections: ${SERVER_MAX_CONNECTIONS:300}
    accept-count: ${SERVER_ACCEPT_COUNT:100}
