spring:
  application:
    name: ecocampus
  datasource:
    url: jdbc:h2:mem:ecocampus;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  jackson:
    default-property-inclusion: non_null

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

springdoc:
  swagger-ui:
    path: /swagger-ui.html

ecocampus:
  file-storage:
    local-dir: ${FILE_STORAGE_LOCAL_DIR:./storage/uploads}
    public-url-prefix: ${FILE_STORAGE_PUBLIC_URL_PREFIX:/uploads}
