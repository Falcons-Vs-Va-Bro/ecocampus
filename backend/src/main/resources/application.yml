spring:
  application:
    name: ecocampus
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:ecocampus}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME:ecocampus_local}
    password: ${DB_PASSWORD:ecocampus_local_password}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:12}
      minimum-idle: ${DB_POOL_MIN_IDLE:3}
      connection-timeout: ${DB_POOL_CONNECTION_TIMEOUT_MS:10000}
  sql:
    init:
      mode: never
  flyway:
    enabled: true
    locations:
      - classpath:db/migration
      - classpath:db/seed
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        jdbc:
          time_zone: Asia/Shanghai
  jackson:
    default-property-inclusion: non_null

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

springdoc:
  swagger-ui:
    path: /swagger-ui.html

ecocampus:
  file-storage:
    local-dir: ${FILE_STORAGE_LOCAL_DIR:./storage/uploads}
    public-url-prefix: ${FILE_STORAGE_PUBLIC_URL_PREFIX:/uploads}
