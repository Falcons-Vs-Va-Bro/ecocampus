spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DB_URL:}
    username: ${DB_USERNAME:}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: EcoCampusMySqlPool
      maximum-pool-size: ${DB_POOL_MAX_SIZE:12}
      minimum-idle: ${DB_POOL_MIN_IDLE:3}
      connection-timeout: ${DB_POOL_CONNECTION_TIMEOUT_MS:10000}
      validation-timeout: ${DB_POOL_VALIDATION_TIMEOUT_MS:5000}
      idle-timeout: ${DB_POOL_IDLE_TIMEOUT_MS:600000}
      max-lifetime: ${DB_POOL_MAX_LIFETIME_MS:1800000}
      leak-detection-threshold: ${DB_POOL_LEAK_DETECTION_MS:0}
  sql:
    init:
      mode: never
  flyway:
    enabled: true
    locations: classpath:db/migration,classpath:db/seed
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        jdbc:
          time_zone: Asia/Shanghai
  main:
    lazy-initialization: true

server:
  address: ${SERVER_ADDRESS:127.0.0.1}
  tomcat:
    threads:
      max: ${SERVER_THREADS_MAX:100}
      min-spare: ${SERVER_THREADS_MIN_SPARE:8}
    max-connections: ${SERVER_MAX_CONNECTIONS:300}
    accept-count: ${SERVER_ACCEPT_COUNT:100}

springdoc:
  api-docs:
    enabled: ${SPRINGDOC_ENABLED:false}

ecocampus:
  cors:
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:}
  file-storage:
    local-dir: ${FILE_STORAGE_LOCAL_DIR:./storage/uploads}
    public-url-prefix: ${FILE_STORAGE_PUBLIC_URL_PREFIX:https://ecocampus-api.teamdsb.online/uploads}
  security:
    jwt-secret: ${JWT_SECRET:}
  swagger-ui:
    enabled: ${SPRINGDOC_ENABLED:false}
